<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Gallery</title>
  <link rel="icon" type="image/png" sizes="512x512" href="njnjnjnj.jpeg">

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --navy: #081120;
      --deep: #0F172A;
      --graphite: #132238;
      --amber: #F59E0B;
      --orange: #FB923C;
      --cyan: #22D3EE;
      --white: #F8FAFC;
      --silver: #CBD5E1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* BACKGROUND */

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(245, 158, 11, .15), transparent 30%),
        radial-gradient(circle at bottom left, rgba(34, 211, 238, .12), transparent 30%);
      z-index: -1;
    }

    /* NAVBAR */

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;

      padding: 1.2rem 3rem;

      display: flex;
      justify-content: space-between;
      align-items: center;

      background: rgba(8, 17, 32, .7);

      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);

      border-bottom: 1px solid rgba(34, 211, 238, .1);
    }

    .logo{
  font-size:1.4rem;
  font-weight:700;
  font-family:'Playfair Display', serif;

  background:linear-gradient(
    135deg,
    var(--amber),
    var(--cyan)
  );

  -webkit-background-clip:text;
  background-clip:text;

  -webkit-text-fill-color:transparent;
  color:transparent;
}

.back-btn{
  text-decoration:none;
  color:var(--cyan);

  border:1px solid rgba(34,211,238,.3);

  padding:.8rem 1.4rem;
  border-radius:10px;

  transition:all .3s ease;

  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.back-btn:hover{
  background:rgba(34,211,238,.08);
  transform:translateY(-3px);

  box-shadow:0 12px 30px rgba(34,211,238,.12);
}

/* HEADER */

.gallery-header{
  padding-top:140px;
  text-align:center;
  margin-bottom:70px;
}

.gallery-header h1{
  font-size:clamp(3rem,7vw,4.5rem);

  font-family:'Playfair Display', serif;
  font-weight:900;

  line-height:1.1;
}

.gallery-header h1 span{
  background:linear-gradient(
    135deg,
    var(--amber),
    var(--cyan)
  );

  -webkit-background-clip:text;
  background-clip:text;

  -webkit-text-fill-color:transparent;
  color:transparent;
}

.gallery-header p{
  color:var(--silver);
  margin-top:15px;
  font-size:1rem;
  line-height:1.7;
}

/* GRID */

.gallery-grid{
  width:90%;
  max-width:1450px;
  margin:auto;

  display:grid;

  grid-template-columns:
    repeat(auto-fit, minmax(300px,1fr));

  gap:35px;

  padding-bottom:100px;
}

/* CARD */

.gallery-card{
  position:relative;

  height:280px;

  border-radius:30px;

  overflow:hidden;

  background:rgba(19,34,56,.8);

  border:1px solid rgba(245,158,11,.2);

  transition:all .4s ease;

  box-shadow:
    0 0 30px rgba(245,158,11,.08),
    0 0 60px rgba(34,211,238,.05);

  isolation:isolate;
}

.gallery-card:hover{
  transform:translateY(-10px) scale(1.02);

  border-color:rgba(245,158,11,.45);

  box-shadow:
    0 25px 80px rgba(245,158,11,.2),
    0 25px 100px rgba(34,211,238,.15);
}

/* IMAGE */

.gallery-card img{
  width:100%;
  height:100%;

  object-fit:cover;
  display:block;

  transition:transform .4s ease;

  filter:none;

  image-rendering:-webkit-optimize-contrast;

  -webkit-transform:translate3d(0,0,0);
  transform:translate3d(0,0,0);

  will-change:transform;
}

.gallery-card:hover img{
  transform:scale(1.04);
}
    /* OVERLAY */

    .gallery-overlay {
      position: absolute;
      inset: 0;

      background: linear-gradient(180deg,
          transparent 55%,
          rgba(8, 17, 32, .55) 100%);
    }

    /* TEXT BOX */

    .gallery-info {
      position: absolute;

      left: 20px;
      right: 20px;
      bottom: 20px;

      padding: 15px;

      border-radius: 15px;

      background: rgba(8, 17, 32, .82);

      border: 1px solid rgba(34, 211, 238, .2);

      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
    }

    .gallery-info h3 {
      font-size: 1rem;
      margin-bottom: 5px;
    }

    .gallery-info p {
      color: var(--cyan);
      font-size: .8rem;
    }

    /* RESPONSIVE */

    @media(max-width:768px) {

      nav {
        padding: 1rem;
      }

      .gallery-header h1 {
        font-size: 2.8rem;
      }

      .gallery-grid {
        width: 93%;
      }

    }
  </style>
</head>

<body>
